  <text x="60" y="240" font-size="24" fill="#475569">证据优先的网站 SEO 与 GEO 审查</text>
  <text x="60" y="292" font-size="20" fill="#64748b">Factual readiness, sampled pages, and evidence-linked repair tasks.</text>
