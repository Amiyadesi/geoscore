  <text x="85" y="472" font-size="14" fill="#64748b">Type + confidence</text>
  <circle cx="375" cy="395" r="22" fill="#dcfce7"/><text x="375" y="402" text-anchor="middle" font-size="20" fill="#15803d">5</text>
